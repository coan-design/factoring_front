<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
  <style>
    body { margin: 0; }
    .tabnum { font-variant-numeric: tabular-nums; }
    a { color: #1F6F72; }
    a:hover { color: #123B3D; }
    input, select { font-family: 'Public Sans', sans-serif; }
  </style>
</helmet>
<div style="display: flex; height: 100vh; width: 100%; background: #F6F7F6; font-family: 'Public Sans', sans-serif; color: #171C1C;">

  <dc-import name="Sidebar" active-item="recebiveis" user-role="OPERADOR" user-name="Renata Ávila" hint-size="236px,100%"></dc-import>

  <div style="flex: 1; min-width: 0; overflow-y: auto;">

    <div style="padding: 24px 40px; border-bottom: 1px solid #E2E6E5; background: white; display: flex; align-items: center; justify-content: space-between;">
      <div>
        <div style="font-size: 12px; color: #6B7473;">Início / Recebíveis / Novo</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 24px; margin-top: 2px;">Novo recebível</div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button style="padding: 9px 16px; border-radius: 6px; border: 1px solid #DDE2E1; background: white; font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: inherit;">Cancelar</button>
        <button style="padding: 9px 16px; border-radius: 6px; border: none; background: #1F6F72; color: white; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit;">Salvar recebível</button>
      </div>
    </div>

    <div style="padding: 32px 40px; max-width: 760px;">

      <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; padding: 26px; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; right: 0; width: 22px; height: 22px; background: #123B3D; clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>

        <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;">Tipo de recebível</div>
        <div style="display: inline-flex; border: 1px solid #DDE2E1; border-radius: 7px; padding: 3px; margin-bottom: 26px;">
          <div onClick="{{ setTipo }}" style="padding: 8px 20px; border-radius: 5px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: {{ bgCheque }}; color: {{ colorCheque }};">Cheque</div>
          <div onClick="{{ setTipoDup }}" style="padding: 8px 20px; border-radius: 5px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: {{ bgDup }}; color: {{ colorDup }};">Duplicata</div>
        </div>

        <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">Dados gerais</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
          <div style="grid-column: span 2;">
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Cliente (cedente)</label>
            <select style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;">
              <option>Fecal Distribuidora Ltda.</option>
              <option>Metalúrgica Vitória S.A.</option>
              <option>Distribuidora Alvorada</option>
            </select>
          </div>
          <div>
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Valor de face</label>
            <input placeholder="R$ 0,00" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
          </div>
          <div>
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Data de vencimento</label>
            <input placeholder="dd/mm/aaaa" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
          </div>
        </div>

        <div style="height: 1px; background: #EEF0EF; margin-bottom: 24px;"></div>

        <sc-if value="{{ isCheque }}">
          <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">Dados do cheque</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Banco</label><input placeholder="Ex: Itaú Unibanco" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" /></div>
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Agência</label><input placeholder="0000" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" /></div>
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Número do cheque</label><input placeholder="000000" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" /></div>
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Emitente</label><input placeholder="Nome no cheque" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" /></div>
          </div>
        </sc-if>

        <sc-if value="{{ isDuplicata }}">
          <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">Dados da duplicata</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Número da duplicata</label><input placeholder="DP-00000" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" /></div>
            <div><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Nota fiscal</label><input placeholder="Nº NF-e" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" /></div>
            <div style="grid-column: span 2;"><label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Sacado</label><input placeholder="Empresa devedora da duplicata" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" /></div>
          </div>
        </sc-if>

        <div style="height: 1px; background: #EEF0EF; margin: 24px 0;"></div>

        <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Fotos do documento</div>
        <div style="font-size: 12.5px; color: #6B7473; margin-bottom: 12px;">Frente e verso {{ fotoHint }}, para conferência e eventual disputa.</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <image-slot id="recebivel-foto-frente" style="width: 100%; height: 160px;" shape="rounded" radius="8" placeholder="Frente do documento"></image-slot>
          </div>
          <div>
            <image-slot id="recebivel-foto-verso" style="width: 100%; height: 160px;" shape="rounded" radius="8" placeholder="Verso do documento"></image-slot>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tipo: 'Cheque' };
  renderVals() {
    const isCheque = this.state.tipo === 'Cheque';
    return {
      isCheque,
      isDuplicata: !isCheque,
      bgCheque: isCheque ? '#1F6F72' : 'transparent',
      colorCheque: isCheque ? 'white' : '#4B5453',
      bgDup: !isCheque ? '#1F6F72' : 'transparent',
      colorDup: !isCheque ? 'white' : '#4B5453',
      setTipo: () => this.setState({ tipo: 'Cheque' }),
      setTipoDup: () => this.setState({ tipo: 'Duplicata' }),
      fotoHint: isCheque ? 'do cheque' : 'da duplicata/nota fiscal',
    };
  }
}

</script>
</body>
</html>
