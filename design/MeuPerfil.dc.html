<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
    .tabnum { font-variant-numeric: tabular-nums; }
    a { color: #1F6F72; }
    a:hover { color: #123B3D; }
    input { font-family: 'Public Sans', sans-serif; }
  </style>
</helmet>
<div style="display: flex; height: 100vh; width: 100%; background: #F6F7F6; font-family: 'Public Sans', sans-serif; color: #171C1C;">

  <dc-import name="Sidebar" active-item="usuarios" user-role="ADMIN" user-name="Renata Ávila" hint-size="236px,100%"></dc-import>

  <div style="flex: 1; min-width: 0; overflow-y: auto;">

    <div style="padding: 24px 40px; border-bottom: 1px solid #E2E6E5; background: white;">
      <div style="font-size: 12px; color: #6B7473;">Início / Meu perfil</div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 24px; margin-top: 2px;">Meu perfil</div>
    </div>

    <div style="padding: 32px 40px; max-width: 640px;">

      <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; padding: 26px; margin-bottom: 20px; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; right: 0; width: 22px; height: 22px; background: #123B3D; clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
          <div style="width: 56px; height: 56px; border-radius: 50%; background: #1F6F72; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: white; flex-shrink: 0;">RA</div>
          <div>
            <div style="font-size: 17px; font-weight: 600;">Renata Ávila</div>
            <div style="display: inline-flex; margin-top: 4px; padding: 3px 9px; border-radius: 5px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.03em; background: #F8E7E5; color: #A8291F;">ADMIN</div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div style="grid-column: span 2;">
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Nome completo</label>
            <input value="Renata Ávila" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" />
          </div>
          <div style="grid-column: span 2;">
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">E-mail corporativo</label>
            <input value="renata.avila@cedrofactoring.com.br" disabled style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; background: #F6F7F6; color: #6B7473;" />
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 22px;">
          <button style="padding: 9px 16px; border-radius: 6px; border: none; background: #1F6F72; color: white; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit;">Salvar alterações</button>
        </div>
      </div>

      <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; padding: 26px;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 4px;">Alterar senha</div>
        <div style="font-size: 12.5px; color: #6B7473; margin-bottom: 18px;">Recomendamos trocar a senha a cada 90 dias.</div>
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Senha atual</label>
            <input type="password" placeholder="••••••••" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Nova senha</label>
              <input type="password" placeholder="••••••••" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" />
            </div>
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Confirmar nova senha</label>
              <input type="password" placeholder="••••••••" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;" />
            </div>
          </div>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 22px;">
          <button style="padding: 9px 16px; border-radius: 6px; border: 1px solid #DDE2E1; background: white; font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: inherit;">Atualizar senha</button>
        </div>
      </div>

    </div>
  </div>
</div>

</x-dc>
</body>
</html>
