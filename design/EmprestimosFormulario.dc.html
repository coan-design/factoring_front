<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
  <style>
    body { margin: 0; }
    .tabnum { font-variant-numeric: tabular-nums; }
    a { color: #1F6F72; }
    a:hover { color: #123B3D; }
    input, select { font-family: 'Public Sans', sans-serif; }
  </style>
</helmet>
<div style="display: flex; height: 100vh; width: 100%; background: #F6F7F6; font-family: 'Public Sans', sans-serif; color: #171C1C;">

  <dc-import name="Sidebar" active-item="emprestimos" user-role="OPERADOR" user-name="Renata Ávila" hint-size="236px,100%"></dc-import>

  <div style="flex: 1; min-width: 0; overflow-y: auto;">

    <div style="padding: 24px 40px; border-bottom: 1px solid #E2E6E5; background: white; display: flex; align-items: center; justify-content: space-between;">
      <div>
        <div style="font-size: 12px; color: #6B7473;"><a href="EmprestimosListagem.dc.html" style="text-decoration: none;">Empréstimos</a> / Novo</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 24px; margin-top: 2px;">Novo empréstimo</div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button style="padding: 9px 16px; border-radius: 6px; border: 1px solid #DDE2E1; background: white; font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: inherit;">Cancelar</button>
        <button onClick="{{ handleSave }}" style="padding: 9px 16px; border-radius: 6px; border: none; background: #1F6F72; color: white; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit;">Salvar empréstimo</button>
      </div>
    </div>

    <div style="padding: 32px 40px;">

      <div style="display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; max-width: 980px;">

        <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; padding: 26px; position: relative; overflow: hidden;">
          <div style="position: absolute; top: 0; right: 0; width: 22px; height: 22px; background: #123B3D; clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>

          <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">Dados do contrato</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
            <div style="grid-column: span 2;">
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Cliente (tomador)</label>
              <select style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px;">
                <option>Fecal Distribuidora Ltda.</option>
                <option>Metalúrgica Vitória S.A.</option>
                <option>Distribuidora Alvorada</option>
              </select>
            </div>
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Valor emprestado</label>
              <input value="{{ valor }}" onChange="{{ setValor }}" placeholder="R$ 0,00" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid {{ valorBorder }}; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
              <sc-if value="{{ valorError }}"><div style="font-size: 12px; color: #A8291F; margin-top: 5px;">Informe o valor emprestado.</div></sc-if>
            </div>
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Data de contratação</label>
              <input placeholder="dd/mm/aaaa" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
            </div>
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Taxa de juros (% a.m.)</label>
              <input value="{{ juros }}" onChange="{{ setJuros }}" placeholder="2,4" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid {{ jurosBorder }}; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
              <sc-if value="{{ jurosError }}"><div style="font-size: 12px; color: #A8291F; margin-top: 5px;">Informe a taxa de juros mensal.</div></sc-if>
            </div>
            <div>
              <label style="font-size: 12.5px; font-weight: 500; color: #4B5453;">Número de parcelas</label>
              <input placeholder="12" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;" />
            </div>
          </div>

          <div style="height: 1px; background: #EEF0EF; margin-bottom: 20px;"></div>

          <div style="display: flex; align-items: center; justify-content: space-between; background: #F6FAFA; border: 1px solid #DCEBEA; border-radius: 8px; padding: 14px 16px;">
            <div>
              <div style="font-size: 12.5px; font-weight: 600; color: #123B3D;">Total a receber (estimado)</div>
              <div style="font-size: 11.5px; color: #6B7473; margin-top: 2px;">Principal + juros, ao gerar as parcelas</div>
            </div>
            <div class="tabnum" style="font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: #123B3D;">{{ totalEstimado }}</div>
          </div>
        </div>

        <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; padding: 22px;">
          <div style="font-size: 12px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Contrato assinado</div>
          <div style="font-size: 12.5px; color: #6B7473; margin-bottom: 12px;">Upload da imagem ou PDF digitalizado do contrato.</div>
          <image-slot id="emprestimo-novo-contrato" style="width: 100%; height: 220px;" shape="rounded" radius="8" placeholder="Upload do contrato"></image-slot>
        </div>

      </div>

    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { valor: '', juros: '', submitted: false };

  parseNum(s) {
    if (!s) return 0;
    return parseFloat(String(s).replace(/[^\d,.-]/g, '').replace(',', '.')) || 0;
  }

  renderVals() {
    const s = this.state;
    const showErrors = s.submitted;
    const valorError = showErrors && !s.valor.trim();
    const jurosError = showErrors && !s.juros.trim();
    const errBorder = '#D98E88', okBorder = '#DDE2E1';
    const principal = this.parseNum(s.valor);
    const taxa = this.parseNum(s.juros) / 100;
    const parcelas = 12;
    const total = principal > 0 ? principal * (1 + taxa * parcelas) : 0;
    return {
      valor: s.valor,
      setValor: (e) => this.setState({ valor: e.target.value }),
      valorBorder: valorError ? errBorder : okBorder,
      valorError,
      juros: s.juros,
      setJuros: (e) => this.setState({ juros: e.target.value }),
      jurosBorder: jurosError ? errBorder : okBorder,
      jurosError,
      totalEstimado: total > 0 ? 'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : 'R$ 0,00',
      handleSave: () => this.setState({ submitted: true }),
    };
  }
}

</script>
</body>
</html>
