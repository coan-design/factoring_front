<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
    .tabnum { font-variant-numeric: tabular-nums; }
    a { color: #1F6F72; }
    a:hover { color: #123B3D; }
    select, input { font-family: 'Public Sans', sans-serif; }
  </style>
</helmet>
<div style="display: flex; height: 100vh; width: 100%; background: #F6F7F6; font-family: 'Public Sans', sans-serif; color: #171C1C;">

  <dc-import name="Sidebar" active-item="emprestimos" user-role="OPERADOR" user-name="Renata Ávila" hint-size="236px,100%"></dc-import>

  <div style="flex: 1; min-width: 0; overflow-y: auto;">

    <div style="padding: 24px 40px; border-bottom: 1px solid #E2E6E5; background: white; display: flex; align-items: center; justify-content: space-between;">
      <div>
        <div style="font-size: 12px; color: #6B7473;">Início / Empréstimos</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 24px; margin-top: 2px;">Empréstimos</div>
      </div>
      <button style="padding: 9px 16px; border-radius: 6px; border: none; background: #1F6F72; color: white; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Novo empréstimo
      </button>
    </div>

    <div style="padding: 32px 40px;">

      <div style="display: flex; gap: 12px; margin-bottom: 20px;">
        <div style="flex: 1; max-width: 340px; position: relative;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B9493" stroke-width="2" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%);"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input placeholder="Buscar por cliente ou número do contrato" style="width: 100%; box-sizing: border-box; padding: 9px 12px 9px 36px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; background: white;" />
        </div>
        <select style="padding: 9px 12px; border-radius: 6px; border: 1px solid #DDE2E1; font-size: 13.5px; background: white; color: #171C1C;">
          <option>Todos os status</option>
          <option>Ativo</option>
          <option>Quitado</option>
          <option>Em atraso</option>
        </select>
      </div>

      <div style="background: white; border: 1px solid #E2E6E5; border-radius: 10px; overflow-x: auto;">
        <table style="width: 100%; min-width: 820px; border-collapse: collapse;">
          <thead>
            <tr style="background: #FAFBFA;">
              <th style="text-align: left; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Contrato</th>
              <th style="text-align: left; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Cliente</th>
              <th style="text-align: right; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Valor emprestado</th>
              <th style="text-align: left; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Parcelas</th>
              <th style="text-align: left; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Próx. vencimento</th>
              <th style="text-align: left; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Status</th>
              <th style="text-align: right; padding: 10px 20px; font-size: 11.5px; font-weight: 600; color: #6B7473; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #E2E6E5;">Ações</th>
            </tr>
          </thead>
          <tbody>
            <sc-for list="{{ loans }}" as="l" hint-placeholder-count="6">
              <tr style="border-bottom: 1px solid #EEF0EF; background: {{ l.rowBg }};" style-hover="background: #FAFBFA;">
                <td class="tabnum" style="padding: 13px 20px; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace;">{{ l.ref }}</td>
                <td style="padding: 13px 20px; font-size: 13.5px; font-weight: 500;">{{ l.client }}</td>
                <td class="tabnum" style="padding: 13px 20px; font-size: 13.5px; font-weight: 600; text-align: right; font-family: 'IBM Plex Mono', monospace;">{{ l.value }}</td>
                <td class="tabnum" style="padding: 13px 20px; font-size: 13.5px; color: #4B5453;">{{ l.parcelas }}</td>
                <td class="tabnum" style="padding: 13px 20px; font-size: 13.5px; font-weight: {{ l.dueWeight }}; color: {{ l.dueColor }};">{{ l.nextDue }}</td>
                <td style="padding: 13px 20px;">
                  <dc-import name="StatusBadge" label="{{ l.statusLabel }}" tone="{{ l.statusTone }}" hint-size="90px,26px"></dc-import>
                </td>
                <td style="padding: 13px 20px; text-align: right;">
                  <a href="EmprestimosDetalhe.dc.html" style="display: inline-block; padding: 6px 12px; border-radius: 6px; background: #EFF4F4; font-size: 12.5px; font-weight: 500; text-decoration: none; color: #1F6F72;">Ver detalhe</a>
                </td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const raw = [
      { ref: 'EMP-2026-0072', client: 'Metalúrgica Vitória S.A.', value: 'R$ 180.000,00', parcelas: '6 de 12', nextDue: '25/07/2026', status: 'Em atraso' },
      { ref: 'EMP-2026-0071', client: 'Fecal Distribuidora Ltda.', value: 'R$ 95.000,00', parcelas: '3 de 10', nextDue: '30/07/2026', status: 'Ativo' },
      { ref: 'EMP-2026-0069', client: 'Distribuidora Alvorada', value: 'R$ 60.000,00', parcelas: '8 de 8', nextDue: '—', status: 'Quitado' },
      { ref: 'EMP-2026-0065', client: 'Comércio Rio Bonito ME', value: 'R$ 42.500,00', parcelas: '2 de 6', nextDue: '05/08/2026', status: 'Ativo' },
      { ref: 'EMP-2026-0061', client: 'Têxtil Bom Retiro Ltda.', value: 'R$ 128.000,00', parcelas: '4 de 12', nextDue: '18/07/2026', status: 'Em atraso' },
    ];
    const toneMap = { Ativo: 'info', Quitado: 'success', 'Em atraso': 'danger' };
    const loans = raw.map(l => ({
      ...l,
      statusLabel: l.status,
      statusTone: toneMap[l.status],
      rowBg: l.status === 'Em atraso' ? '#FBF1F0' : 'transparent',
      dueColor: l.status === 'Em atraso' ? '#A8291F' : '#4B5453',
      dueWeight: l.status === 'Em atraso' ? 700 : 400,
    }));
    return { loans };
  }
}

</script>
</body>
</html>
